<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rich Media Ads</title>

<style>

body{
    margin:0;
    padding:40px;
    background:#f5f5f5;
    font-family:Arial,sans-serif;
}

h1{
    text-align:center;
    margin-bottom:50px;
}

.wrapper{
    max-width:1400px;
    margin:auto;
}

.card{
    background:white;
    padding:24px;
    margin-bottom:40px;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.card h2{
    margin-top:0;
    margin-bottom:20px;
}

iframe{
    display:block;
    width:100%;
    border:none;
    background:white;
}

/* Poziome */

.horizontal iframe{
    height:220px;
}

/* Pionowe */

.vertical-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:40px;
}

.vertical iframe{
    height:620px;
}

@media(max-width:1000px){

    .vertical-grid{
        grid-template-columns:1fr;
    }

    .vertical iframe{
        height:620px;
    }

}

</style>
</head>

<body>

<h1>Rich Media Ads</h1>

<div class="wrapper">

    <!-- BANER 1 -->

    <div class="card horizontal">
        <h2>Baner 1</h2>
        <iframe src="baner1/baner1/" scrolling="no"></iframe>
    </div>

    <!-- BANER 2 + 3 -->

    <div class="vertical-grid">

        <div class="card vertical">
            <h2>Baner 2</h2>
            <iframe src="baner2/gwd_preview_baner2/" scrolling="no"></iframe>
        </div>

        <div class="card vertical">
            <h2>Baner 3</h2>
            <iframe src="baner3/gwd_preview_baner3/" scrolling="no"></iframe>
        </div>

    </div>

    <!-- BANER 4 -->

    <div class="card horizontal">
        <h2>Baner 4</h2>
        <iframe src="baner4/gwd_preview_baner4/" scrolling="no"></iframe>
    </div>

</div>

</body>
</html>
