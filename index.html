<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rich Media Ads</title>

<style>
body{
    margin:0;
    padding:40px;
    background:#f5f5f5;
    font-family:Arial, sans-serif;
}

h1{
    text-align:center;
    margin-bottom:50px;
}

.wrapper{
    max-width:1200px;
    margin:auto;
}

.card{
    background:white;
    padding:24px;
    margin-bottom:40px;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.card h2{
    margin-top:0;
    margin-bottom:20px;
    font-size:18px;
}

iframe{
    display:block;
    width:100%;
    min-height:260px;
    border:none;
    background:white;
    overflow:hidden;
}
</style>
</head>

<body>

<h1>Rich Media Ads</h1>

<div class="wrapper">

    <div class="card">
        <h2>Baner 1</h2>
        <iframe src="baner1/baner1/" scrolling="no"></iframe>
    </div>

    <div class="card">
        <h2>Baner 2</h2>
        <iframe src="baner2/baner2.html" scrolling="no"></iframe>
    </div>

    <div class="card">
        <h2>Baner 3</h2>
        <iframe src="baner3/baner3.html" scrolling="no"></iframe>
    </div>

    <div class="card">
        <h2>Baner 4</h2>
        <iframe src="baner4/baner4.html" scrolling="no"></iframe>
    </div>

</div>

</body>
</html>
