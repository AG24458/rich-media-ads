<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rich Media Ads</title>

<style>
body{
    margin:0;
    padding:40px;
    background:#f5f5f5;
    font-family:Arial, sans-serif;
}

h1{
    text-align:center;
    margin-bottom:40px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:30px;
    max-width:1400px;
    margin:auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.card h2{
    margin-top:0;
    font-size:18px;
}

iframe{
    width:100%;
    height:380px;
    border:none;
    background:white;
}

@media(max-width:900px){
    .grid{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<h1>Rich Media Ads</h1>

<div class="grid">

    <div class="card">
        <h2>Baner 1</h2>
        <iframe src="baner1/baner1/"></iframe>
    </div>

    <div class="card">
        <h2>Baner 2</h2>
        <iframe src="baner2/baner2/"></iframe>
    </div>

    <div class="card">
        <h2>Baner 3</h2>
        <iframe src="baner3/baner3/"></iframe>
    </div>

    <div class="card">
        <h2>Baner 4</h2>
        <iframe src="baner4/baner4/"></iframe>
    </div>

</div>

</body>
</html>
